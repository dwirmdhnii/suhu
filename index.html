<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Monitoring Ruangan · Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#0a1730;
    --bg-2:#122a4d;
    --panel:rgba(255,255,255,0.055);
    --panel-border:rgba(255,255,255,0.10);
    --text-main:#eef4fb;
    --text-dim:#7f93b3;
    --heat:#ffa94d;
    --heat-soft:#ff7b54;
    --cool:#57d9e8;
    --cool-soft:#3aa8e0;
    --good:#5ee3a3;
    --bad:#ff6b6b;
    --radius:28px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{height:100%;}

  body{
    font-family:'Inter',sans-serif;
    color:var(--text-main);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:48px 20px;
    overflow-x:hidden;
    position:relative;
    background:
      radial-gradient(ellipse 900px 600px at 15% -10%, rgba(255,169,77,0.10), transparent 60%),
      radial-gradient(ellipse 900px 700px at 110% 10%, rgba(87,217,232,0.12), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2) 60%, #0d1f3c);
    transition: background 1.6s ease;
  }

  /* drifting atmospheric orbs — signature ambient layer */
  .sky{
    position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;
  }
  .orb{
    position:absolute;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.55;
    mix-blend-mode:screen;
  }
  .orb.o1{
    width:420px;height:420px; top:-120px; left:-100px;
    background:radial-gradient(circle at 35% 35%, var(--heat), transparent 70%);
    animation:driftA 26s ease-in-out infinite;
  }
  .orb.o2{
    width:360px;height:360px; bottom:-140px; right:-80px;
    background:radial-gradient(circle at 40% 40%, var(--cool), transparent 70%);
    animation:driftB 32s ease-in-out infinite;
  }
  .orb.o3{
    width:200px;height:200px; top:40%; right:12%;
    background:radial-gradient(circle at 40% 40%, #ffffff, transparent 70%);
    opacity:0.06;
    animation:driftC 20s ease-in-out infinite;
  }
  @keyframes driftA{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(60px,50px) scale(1.12);}
  }
  @keyframes driftB{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-50px,-40px) scale(1.08);}
  }
  @keyframes driftC{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(-30px,40px);}
  }

  /* twinkling star grain */
  .grain{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.5;
    background-image:radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.5), transparent),
                      radial-gradient(1px 1px at 70% 65%, rgba(255,255,255,.4), transparent),
                      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.3), transparent),
                      radial-gradient(1px 1px at 85% 20%, rgba(255,255,255,.4), transparent),
                      radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,.3), transparent);
    background-repeat:repeat;
    background-size:400px 400px;
  }

  .wrap{ position:relative; z-index:1; width:100%; max-width:920px; }

  /* status pill */
  .status-row{
    display:flex; justify-content:center; margin-bottom:28px;
  }
  .status-pill{
    display:inline-flex; align-items:center; gap:10px;
    padding:9px 18px 9px 14px;
    border-radius:999px;
    background:var(--panel);
    border:1px solid var(--panel-border);
    backdrop-filter:blur(14px);
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
    color:var(--text-dim);
    transition:color .4s ease;
  }
  .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--bad);
    box-shadow:0 0 0 0 rgba(255,107,107,.6);
  }
  .status-pill.on .dot{
    background:var(--good);
    animation:pulse 1.8s ease-in-out infinite;
  }
  .status-pill.on{ color:#c9f5df; }
  .status-pill.warn .dot{ background:#ffd166; }
  .status-pill.warn{ color:#ffe8b0; }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(94,227,163,.55);}
    70%{box-shadow:0 0 0 9px rgba(94,227,163,0);}
    100%{box-shadow:0 0 0 0 rgba(94,227,163,0);}
  }

  /* heading */
  .heading{ text-align:center; margin-bottom:44px; }
  .eyebrow{
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--text-dim);
    margin-bottom:10px;
  }
  h1{
    font-family:'Outfit',sans-serif;
    font-weight:700;
    font-size:clamp(30px,5vw,44px);
    letter-spacing:-0.01em;
  }
  h1 span{
    background:linear-gradient(90deg,var(--heat),var(--cool));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }

  /* cards */
  .cards{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:22px;
  }
  @media (max-width:640px){ .cards{ grid-template-columns:1fr; } }

  .card{
    position:relative;
    background:var(--panel);
    border:1px solid var(--panel-border);
    border-radius:var(--radius);
    backdrop-filter:blur(16px);
    padding:32px 28px 28px;
    overflow:hidden;
    transition:transform .35s ease, border-color .35s ease;
  }
  .card::before{
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(circle at 85% -10%, var(--accent-glow) 0%, transparent 55%);
    opacity:.5;
    pointer-events:none;
  }
  .card:hover{ transform:translateY(-4px); border-color:rgba(255,255,255,0.2); }
  .card.temp{ --accent-glow:rgba(255,169,77,0.35); }
  .card.hum{ --accent-glow:rgba(87,217,232,0.35); }

  .card-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:18px;
  }
  .card-label{
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--text-dim);
  }
  .card-icon{ width:26px; height:26px; opacity:.85; }

  .gauge-area{
    display:flex; align-items:center; justify-content:center;
    position:relative;
    margin:6px 0 18px;
  }
  svg.gauge{ width:190px; height:190px; transform:rotate(-90deg); }
  .track{ fill:none; stroke:rgba(255,255,255,0.08); stroke-width:10; }
  .fill{
    fill:none; stroke-width:10; stroke-linecap:round;
    stroke-dasharray:471; stroke-dashoffset:471;
    transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1), stroke 1s ease;
  }
  .fill.temp-fill{ stroke:url(#gradTemp); }
  .fill.hum-fill{ stroke:url(#gradHum); }

  .gauge-value{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .value{
    font-family:'Outfit',sans-serif;
    font-weight:800;
    font-size:44px;
    line-height:1;
    letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;
  }
  .unit{
    font-family:'Space Mono',monospace;
    font-size:13px;
    color:var(--text-dim);
    margin-top:6px;
  }

  .card-foot{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Space Mono',monospace;
    font-size:11.5px;
    color:var(--text-dim);
    letter-spacing:.03em;
    border-top:1px solid rgba(255,255,255,0.08);
    padding-top:14px;
  }
  .tag{
    padding:3px 9px;
    border-radius:999px;
    background:rgba(255,255,255,0.06);
  }
  .tag.temp-tag{ color:var(--heat); }
  .tag.hum-tag{ color:var(--cool); }

  /* footer meta */
  .meta{
    margin-top:32px;
    display:flex; justify-content:center; gap:22px; flex-wrap:wrap;
    font-family:'Space Mono',monospace;
    font-size:11.5px;
    color:var(--text-dim);
    letter-spacing:.04em;
  }
  .meta b{ color:var(--text-main); font-weight:600; }

  @media (prefers-reduced-motion: reduce){
    .orb, .status-pill.on .dot{ animation:none !important; }
    .card{ transition:none; }
  }
</style>
</head>
<body>

<div class="sky">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>
<div class="grain"></div>

<div class="wrap">

  <div class="status-row">
    <div class="status-pill" id="statusPill">
      <span class="dot"></span>
      <span id="statusText">Menghubungkan MQTT…</span>
    </div>
  </div>

  <div class="heading">
    <div class="eyebrow">Live Sensor · Rumah</div>
    <h1>Monitoring <span>Ruangan</span></h1>
  </div>

  <div class="cards">

    <div class="card temp">
      <div class="card-top">
        <span class="card-label">Suhu Udara</span>
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#ffa94d" stroke-width="1.6">
          <path d="M12 3a2 2 0 0 0-2 2v9.17a3.5 3.5 0 1 0 4 0V5a2 2 0 0 0-2-2Z" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="17" r="1.6" fill="#ffa94d"/>
        </svg>
      </div>

      <div class="gauge-area">
        <svg class="gauge" viewBox="0 0 170 170">
          <defs>
            <linearGradient id="gradTemp" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffd166"/>
              <stop offset="100%" stop-color="#ff7b54"/>
            </linearGradient>
          </defs>
          <circle class="track" cx="85" cy="85" r="75"/>
          <circle class="fill temp-fill" id="tempArc" cx="85" cy="85" r="75"/>
        </svg>
        <div class="gauge-value">
          <div class="value" id="suhu">--</div>
          <div class="unit">°C</div>
        </div>
      </div>

      <div class="card-foot">
        <span id="tempStatusTag" class="tag temp-tag">Menunggu data</span>
        <span id="tempTime">--:--:--</span>
      </div>
    </div>

    <div class="card hum">
      <div class="card-top">
        <span class="card-label">Kelembapan</span>
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="#57d9e8" stroke-width="1.6">
          <path d="M12 3s6.5 7.06 6.5 11.5A6.5 6.5 0 0 1 5.5 14.5C5.5 10.06 12 3 12 3Z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="gauge-area">
        <svg class="gauge" viewBox="0 0 170 170">
          <defs>
            <linearGradient id="gradHum" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8fe8f0"/>
              <stop offset="100%" stop-color="#3aa8e0"/>
            </linearGradient>
          </defs>
          <circle class="track" cx="85" cy="85" r="75"/>
          <circle class="fill hum-fill" id="humArc" cx="85" cy="85" r="75"/>
        </svg>
        <div class="gauge-value">
          <div class="value" id="kelembapan">--</div>
          <div class="unit">%</div>
        </div>
      </div>

      <div class="card-foot">
        <span id="humStatusTag" class="tag hum-tag">Menunggu data</span>
        <span id="humTime">--:--:--</span>
      </div>
    </div>

  </div>

  <div class="meta">
    <span>Broker: <b>broker.emqx.io</b></span>
    <span>Topic: <b>rumah/sensor/data</b></span>
    <span>Update terakhir: <b id="lastUpdate">belum ada</b></span>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>
<script>
  const broker = "wss://broker.emqx.io:8084/mqtt";
  const topic  = "rumah/sensor/data";

  const CIRCUMFERENCE = 2 * Math.PI * 75; // r=75

  const statusPill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  const tempArc = document.getElementById('tempArc');
  const humArc  = document.getElementById('humArc');
  const suhuEl  = document.getElementById('suhu');
  const kelEl   = document.getElementById('kelembapan');
  const tempTag = document.getElementById('tempStatusTag');
  const humTag  = document.getElementById('humStatusTag');
  const tempTime= document.getElementById('tempTime');
  const humTime = document.getElementById('humTime');
  const lastUpdate = document.getElementById('lastUpdate');
  const body = document.body;

  function setStatus(mode, text){
    statusPill.className = 'status-pill ' + mode;
    statusText.textContent = text;
  }

  function setArc(el, value, min, max){
    const pct = Math.max(0, Math.min(1, (value - min) / (max - min)));
    const offset = CIRCUMFERENCE * (1 - pct);
    el.style.strokeDashoffset = offset;
  }

  function animateNumber(el, target){
    const start = parseFloat(el.textContent) || 0;
    const dur = 700;
    const t0 = performance.now();
    function step(t){
      const p = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      const val = start + (target - start) * eased;
      el.textContent = (Math.round(val * 10) / 10).toString();
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = target.toString();
    }
    requestAnimationFrame(step);
  }

  function nowStr(){
    return new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function tempTagFor(v){
    if (v < 20) return {t:'Sejuk', c:'#57d9e8'};
    if (v < 28) return {t:'Nyaman', c:'#5ee3a3'};
    if (v < 32) return {t:'Hangat', c:'#ffd166'};
    return {t:'Panas', c:'#ff7b54'};
  }
  function humTagFor(v){
    if (v < 30) return {t:'Kering', c:'#ffd166'};
    if (v < 60) return {t:'Ideal', c:'#5ee3a3'};
    return {t:'Lembap', c:'#57d9e8'};
  }

  function applySkyMood(temp){
    // subtle background shift toward warm or cool depending on live temperature
    const warm = Math.max(0, Math.min(1, (temp - 18) / 16));
    const g1 = `radial-gradient(ellipse 900px 600px at 15% -10%, rgba(255,169,77,${0.06 + warm*0.10}), transparent 60%)`;
    const g2 = `radial-gradient(ellipse 900px 700px at 110% 10%, rgba(87,217,232,${0.16 - warm*0.10}), transparent 60%)`;
    body.style.background = `${g1}, ${g2}, linear-gradient(180deg, var(--bg-1), var(--bg-2) 60%, #0d1f3c)`;
  }

  const client = mqtt.connect(broker, {
    reconnectPeriod: 3000,
    connectTimeout: 10000
  });

  client.on("connect", () => {
    setStatus('on', 'Terhubung · MQTT Live');
    client.subscribe(topic);
  });

  client.on("message", (t, message) => {
    try{
      const data = JSON.parse(message.toString());
      const suhu = parseFloat(data.suhu);
      const kelembapan = parseFloat(data.kelembapan);

      if(!isNaN(suhu)){
        animateNumber(suhuEl, suhu);
        setArc(tempArc, suhu, 0, 45);
        const info = tempTagFor(suhu);
        tempTag.textContent = info.t;
        tempTag.style.color = info.c;
        tempTime.textContent = nowStr();
        applySkyMood(suhu);
      }
      if(!isNaN(kelembapan)){
        animateNumber(kelEl, kelembapan);
        setArc(humArc, kelembapan, 0, 100);
        const info = humTagFor(kelembapan);
        humTag.textContent = info.t;
        humTag.style.color = info.c;
        humTime.textContent = nowStr();
      }
      lastUpdate.textContent = nowStr();
    }catch(e){
      console.error("Payload tidak valid:", e);
    }
  });

  client.on("reconnect", () => {
    setStatus('warn', 'Menyambung ulang…');
  });

  client.on("offline", () => {
    setStatus('', 'Offline');
  });

  client.on("error", (err) => {
    console.log(err);
    setStatus('', 'Error MQTT');
  });
</script>

</body>
</html>
