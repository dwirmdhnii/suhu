<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard Suhu</title>

<style>

body{
    background:#eef3f8;
    font-family:Arial;
    text-align:center;
}

.card{

    width:300px;

    margin:20px auto;

    background:white;

    padding:25px;

    border-radius:20px;

    box-shadow:0 4px 15px rgba(0,0,0,.2);

}

.value{

    font-size:60px;

    font-weight:bold;

}

.connected{

    color:green;

}

.disconnected{

    color:red;

}

</style>

</head>

<body>

<h1>Monitoring Ruangan</h1>

<div class="card">

<h2>Suhu</h2>

<div id="suhu" class="value">--</div>

°C

</div>

<div class="card">

<h2>Kelembapan</h2>

<div id="kelembapan" class="value">--</div>

%

</div>

<h3 id="status">Menghubungkan MQTT...</h3>

<script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>

<script>

const broker="wss://broker.emqx.io:8084/mqtt";

const topic="rumah/sensor/data";

const client=mqtt.connect(broker,{

    reconnectPeriod:3000,

    connectTimeout:10000

});

client.on("connect",()=>{

    console.log("CONNECTED");

    status.innerHTML="Terhubung";

    status.className="connected";

    client.subscribe(topic);

});

client.on("message",(topic,message)=>{

    let data=JSON.parse(message.toString());

    document.getElementById("suhu").innerHTML=data.suhu;

    document.getElementById("kelembapan").innerHTML=data.kelembapan;

});

client.on("reconnect",()=>{

    status.innerHTML="Reconnect...";

    status.className="disconnected";

});

client.on("offline",()=>{

    status.innerHTML="Offline";

    status.className="disconnected";

});

client.on("error",(err)=>{

    console.log(err);

    status.innerHTML="Error MQTT";

    status.className="disconnected";

});

</script>

</body>

</html>
